<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LFC Commercial — Sponsorship Signal Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #C8102E; --red-dark: #9e0c24; --red-light: #f8e9ec;
    --gold: #F6C63A;
    --grey-50: #f9fafb; --grey-100: #f3f4f6; --grey-200: #e5e7eb;
    --grey-400: #9ca3af; --grey-500: #6b7280; --grey-600: #4b5563;
    --grey-800: #1f2937; --grey-900: #111827;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,.1);
    --shadow-lg: 0 10px 40px rgba(0,0,0,.15);
    --radius: 12px; --radius-sm: 8px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--grey-100); color: var(--grey-800); min-height: 100vh; }

  /* ── HEADER ── */
  .header { background: var(--red); color: white; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; box-shadow: 0 2px 12px rgba(200,16,46,.35); position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .lfc-badge { width: 38px; height: 38px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; color: var(--red); flex-shrink: 0; }
  .header h1 { font-size: 1.05rem; font-weight: 700; letter-spacing: -.01em; }
  .header h1 span { font-weight: 400; opacity: .75; font-size: .88rem; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .scan-badge { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.2); color: white; padding: 4px 12px; border-radius: 20px; font-size: .78rem; font-weight: 500; }
  .hbtn { border: none; padding: 8px 14px; border-radius: 8px; font-weight: 700; font-size: .8rem; cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 5px; }
  .hbtn.ghost { background: rgba(255,255,255,.15); color: white; border: 1px solid rgba(255,255,255,.25); }
  .hbtn.ghost:hover { background: rgba(255,255,255,.25); }
  .loading-bar { height: 3px; background: var(--gold); position: fixed; top: 64px; left: 0; z-index: 99; transition: width .4s ease; }

  /* ── MAIN ── */
  .main { max-width: 1400px; margin: 0 auto; padding: 24px 24px 60px; }

  /* ── STATS ── */
  .stats-row { display: flex; gap: 14px; margin-bottom: 20px; }
  .stat-card { background: white; border-radius: var(--radius); padding: 18px 24px; box-shadow: var(--shadow-sm); flex: 1; }
  .stat-val { font-size: 2.2rem; font-weight: 800; color: var(--grey-900); line-height: 1; }
  .stat-lbl { font-size: .73rem; color: var(--grey-400); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-top: 5px; }

  /* ── TOOLBAR ── */
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .search-wrap { position: relative; }
  .search-wrap input { background: white; border: 1.5px solid var(--grey-200); border-radius: 8px; padding: 8px 12px 8px 34px; font-size: .84rem; width: 260px; outline: none; transition: border .15s; }
  .search-wrap input:focus { border-color: var(--red); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--grey-400); font-size: 13px; pointer-events: none; }

  /* ── SIGNAL FILTERS ── */
  .sig-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 10px 14px; background: white; border: 1.5px solid var(--grey-200); border-radius: var(--radius-sm); margin-bottom: 20px; }
  .sig-row-label { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--grey-400); flex-shrink: 0; margin-right: 2px; }
  .sig-btn { display: inline-flex; align-items: center; gap: 4px; padding: 4px 11px; border-radius: 20px; font-size: .75rem; font-weight: 600; cursor: pointer; border: 1.5px solid var(--grey-200); background: var(--grey-50); color: var(--grey-600); transition: all .15s; white-space: nowrap; }
  .sig-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-light); }
  .sig-btn.on { background: var(--grey-900); border-color: var(--grey-900); color: white; }
  .sig-btn .n { background: var(--grey-200); border-radius: 20px; padding: 1px 6px; font-size: .68rem; color: var(--grey-500); }
  .sig-btn.on .n { background: rgba(255,255,255,.18); color: white; }
  .clear-btn { margin-left: auto; font-size: .74rem; color: var(--red); cursor: pointer; background: none; border: none; font-weight: 600; padding: 4px 8px; border-radius: 6px; transition: background .15s; flex-shrink: 0; }
  .clear-btn:hover { background: var(--red-light); }
  .clear-btn:disabled { opacity: .3; cursor: default; }

  /* ── GRID ── */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 18px; }

  /* ── CARD ── */
  .card { background: white; border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden; border: 1.5px solid var(--grey-200); cursor: pointer; transition: box-shadow .2s, transform .15s, border-color .15s; }
  .card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: var(--red); }
  .card-top-bar { height: 4px; background: var(--red); }

  .card-header { padding: 16px 18px 14px; display: flex; align-items: center; gap: 13px; border-bottom: 1px solid var(--grey-100); }
  .card-identity { flex: 1; min-width: 0; }
  .card-identity h3 { font-size: .97rem; font-weight: 700; color: var(--grey-900); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
  .tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .tag { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 20px; font-size: .69rem; font-weight: 600; }
  .tag.sector { background: #eff6ff; color: #2563eb; }
  .tag.hq { background: var(--grey-100); color: var(--grey-600); }
  .tag.rev { background: #f0fdf4; color: #16a34a; }

  .card-signals { padding: 13px 18px 16px; display: flex; flex-direction: column; gap: 8px; }
  .sig-count-label { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--grey-400); margin-bottom: 2px; }

  .signal-chip { display: flex; align-items: flex-start; gap: 10px; background: var(--grey-50); border: 1px solid var(--grey-200); border-radius: var(--radius-sm); padding: 10px 12px; transition: border-color .15s; }
  .signal-chip:hover { border-color: #d1d5db; }
  .sig-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
  .sig-body { flex: 1; min-width: 0; }
  .sig-type { font-size: .77rem; font-weight: 700; color: var(--grey-800); margin-bottom: 2px; }
  .sig-desc { font-size: .74rem; color: var(--grey-600); line-height: 1.45; }
  .sig-meta { display: flex; align-items: center; gap: 8px; margin-top: 5px; flex-wrap: wrap; }
  .sig-source { font-size: .68rem; color: var(--grey-400); }
  .sig-link { font-size: .68rem; color: var(--red); font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 3px; }
  .sig-link:hover { text-decoration: underline; }

  .more-signals { font-size: .72rem; color: var(--grey-400); text-align: center; padding: 4px 0 0; }

  /* ── EMPTY / ERROR ── */
  .empty { grid-column: 1/-1; text-align: center; padding: 80px 24px; }
  .empty-icon { font-size: 3rem; margin-bottom: 16px; }
  .empty h3 { font-size: 1.05rem; color: var(--grey-600); margin-bottom: 8px; font-weight: 700; }
  .empty p { font-size: .875rem; color: var(--grey-400); max-width: 380px; margin: 0 auto; line-height: 1.6; }

  /* ── MODAL ── */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; backdrop-filter: blur(3px); opacity: 0; pointer-events: none; transition: opacity .2s; }
  .overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: white; border-radius: 16px; width: 100%; max-width: 640px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); transform: translateY(16px); transition: transform .2s; }
  .overlay.open .modal { transform: translateY(0); }
  .modal-hdr { padding: 22px 22px 16px; border-bottom: 1px solid var(--grey-200); display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; position: sticky; top: 0; background: white; z-index: 1; }
  .modal-hdr-left { display: flex; align-items: center; gap: 13px; }
  .modal-hdr h2 { font-size: 1.1rem; font-weight: 800; color: var(--grey-900); margin-bottom: 5px; }
  .close-btn { width: 30px; height: 30px; background: var(--grey-100); border: none; border-radius: 50%; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--grey-500); transition: all .15s; flex-shrink: 0; }
  .close-btn:hover { background: var(--red); color: white; }
  .modal-body { padding: 20px 22px 24px; }
  .modal-section { margin-bottom: 22px; }
  .modal-section-title { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--grey-400); margin-bottom: 10px; }
  .modal-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 4px; }
  .info-item .lbl { font-size: .68rem; color: var(--grey-400); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 2px; }
  .info-item .val { font-size: .86rem; font-weight: 600; color: var(--grey-800); }
  .modal-signal { background: var(--grey-50); border: 1px solid var(--grey-200); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 10px; }
  .modal-signal-hdr { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: .88rem; color: var(--grey-900); margin-bottom: 7px; }
  .modal-signal-desc { font-size: .82rem; color: var(--grey-600); line-height: 1.55; }
  .modal-signal-news { margin-top: 10px; padding: 9px 12px; background: white; border-radius: 7px; border: 1px solid var(--grey-200); }
  .modal-signal-news .headline { font-size: .8rem; font-weight: 700; color: var(--grey-800); margin-bottom: 4px; line-height: 1.4; }
  .modal-signal-news .source-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .modal-signal-news .source { font-size: .72rem; color: var(--grey-400); }
  .modal-signal-news .article-link { font-size: .72rem; color: var(--red); font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 3px; }
  .modal-signal-news .article-link:hover { text-decoration: underline; }

  /* ── TOAST ── */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--grey-900); color: white; padding: 11px 16px; border-radius: 10px; font-size: .83rem; font-weight: 500; z-index: 500; transform: translateY(70px); opacity: 0; transition: all .25s; }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 640px) {
    .header { padding: 0 1rem; } .main { padding: 14px 12px 48px; }
    .grid { grid-template-columns: 1fr; } .stats-row { flex-direction: column; }
    .search-wrap input { width: 180px; }
  }
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar" style="width:0"></div>

<header class="header">
  <div class="header-left">
    <div class="lfc-badge">LFC</div>
    <h1>Commercial Signals <span>/ Sponsorship Prospecting</span></h1>
  </div>
  <div class="header-right">
    <span class="scan-badge" id="scanBadge">Loading…</span>
    <button class="hbtn ghost" onclick="fetchData()">↻ Refresh</button>
  </div>
</header>

<main class="main">

  <!-- Stats -->
  <div class="stats-row" id="statsRow" style="display:none">
    <div class="stat-card"><div class="stat-val" id="statCompanies">—</div><div class="stat-lbl">Companies Today</div></div>
    <div class="stat-card"><div class="stat-val" id="statSignals">—</div><div class="stat-lbl">Signals Detected</div></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar" id="toolbar" style="display:none">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search companies, sectors, signals…" oninput="render()" />
    </div>
  </div>

  <!-- Signal filters -->
  <div class="sig-row" id="sigRow" style="display:none">
    <span class="sig-row-label">Signal type</span>
    <div id="sigBtns" style="display:flex;gap:6px;flex-wrap:wrap;flex:1;"></div>
    <button class="clear-btn" id="clearBtn" onclick="clearFilters()" disabled>Clear</button>
  </div>

  <!-- Cards -->
  <div class="grid" id="grid">
    <div class="empty">
      <div class="empty-icon">⚽</div>
      <h3>Loading today's signals…</h3>
      <p>Fetching the latest scan from GitHub. Refresh the page if this takes more than a few seconds.</p>
    </div>
  </div>

</main>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-hdr-left">
        <div id="mAvatar"></div>
        <div>
          <h2 id="mTitle"></h2>
          <div id="mTags" style="display:flex;gap:5px;flex-wrap:wrap;"></div>
        </div>
      </div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="mBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
const DATA_URL = 'https://fletchert131-sudo.github.io/lfc-signals/scan_results/signals_latest.json';

const SIGNAL_TYPES = [
  { id: 'leadership_change',     icon: '👤', label: 'Leadership Change' },
  { id: 'strong_financials',     icon: '📊', label: 'Strong Financials' },
  { id: 'major_funding',         icon: '💰', label: 'Major Funding' },
  { id: 'market_expansion',      icon: '🌍', label: 'Market Expansion' },
  { id: 'global_expansion',      icon: '🌐', label: 'Global Expansion' },
  { id: 'product_launch',        icon: '🚀', label: 'Product Launch' },
  { id: 'rebrand',               icon: '🔄', label: 'Rebrand' },
  { id: 'sports_sponsorship',    icon: '🏅', label: 'Sports Sponsorship' },
  { id: 'esg_sustainability',    icon: '🌿', label: 'ESG / Sustainability' },
  { id: 'stock_listing',         icon: '🏛️', label: 'Stock Market Listing' },
  // Legacy IDs for backward compat
  { id: 'financial_performance', icon: '📊', label: 'Strong Financials' },
  { id: 'funding_announcement',  icon: '💰', label: 'Major Funding' },
  { id: 'major_global_expansion',icon: '🌐', label: 'Global Expansion' },
  { id: 'global_awareness',      icon: '📣', label: 'Brand Campaign' },
  { id: 'major_partnership',     icon: '🤝', label: 'Major Partnership' },
  { id: 'competitor_sponsorship',icon: '🏆', label: 'Competitor Activity' },
  { id: 'sports_affinity',       icon: '⚽', label: 'Sports Affinity' },
];

// ── STATE ─────────────────────────────────────────────────────────────────
let allCompanies = [];
let activeFilters = new Set();

// ── AVATAR ────────────────────────────────────────────────────────────────
const AVATAR_PALETTE = [
  ['#dbeafe','#1d4ed8'], ['#fce7f3','#be185d'], ['#d1fae5','#065f46'],
  ['#fef3c7','#92400e'], ['#ede9fe','#5b21b6'], ['#fee2e2','#991b1b'],
  ['#e0f2fe','#0369a1'], ['#f0fdf4','#166534'], ['#fef9c3','#854d0e'],
  ['#f3e8ff','#7e22ce'],
];
function avatarColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) | 0;
  return AVATAR_PALETTE[Math.abs(h) % AVATAR_PALETTE.length];
}
function avatarHTML(name, size = 44) {
  const inits = name.split(/\s+/).slice(0,2).map(w => w[0] || '').join('').toUpperCase();
  const [bg, fg] = avatarColor(name);
  const fs = Math.round(size * 0.36);
  const r = size >= 46 ? '10px' : '8px';
  return `<div style="width:${size}px;height:${size}px;border-radius:${r};background:${bg};color:${fg};display:flex;align-items:center;justify-content:center;font-size:${fs}px;font-weight:800;flex-shrink:0;">${inits}</div>`;
}

// ── EMBEDDED DATA (injected by push_dashboard.py) ────────────────────────
const EMBEDDED_SCAN_DATA = {"scan_date": "2026-03-19", "total_companies": 6, "companies": [{"company_name": "Ferrero Group", "sector": "Confectionery & Consumer Goods", "estimated_revenue_usd_bn": 21, "headquarters": "Alba, Italy / Luxembourg", "decision_maker_title": "CEO / North America President Noel Geoffroy", "signals": [{"signal_id": "market_expansion", "signal_label": "€19.3bn Company With 8% US Market Share Spending $100M+ to Close the Gap — $7bn in Acquisitions Now Need a Brand Identity", "description": "Ferrero is the third-largest confectionery company globally (€19.3bn revenue, 7.6% global market share) but holds only 8% of the US market — compared to Hershey's 23.6% and Mars's ~18%. Since 2018, they've spent over $7bn acquiring their way into the US: Nestlé US confectionery ($2.8bn, 2018 — Butterfinger, Baby Ruth, 100 Grand), Kellogg's cookies ($1.3bn, 2019 — Keebler, Famous Amos), and WK Kellogg ($3.1bn, closed Sept 2025 — Frosted Flakes, Froot Loops, Rice Krispies). They now own 20+ brands across confectionery, cereals, cookies, ice cream, and protein bars — but these acquisitions were bought fragmented and the unified brand identity doesn't exist yet. The $100M+ sports marketing initiative (Super Bowl, World Cup 2026) is the first attempt to build that umbrella. Internally, Kinder is described as their 'most under-leveraged brand in the portfolio relative to its global success' — it's the best-selling chocolate brand in the world but most Americans don't know that. They also opened a $214M production facility in Illinois and grew US headcount from 300 to 5,000+ in a decade. The competitive pressure: Mars and Mondelez already have established sports sponsorship portfolios. Ferrero is playing catch-up. The World Cup is a tentpole, but it ends in July — after that, they'll need ongoing global platforms to sustain the brand-building momentum across a portfolio this large.", "news_headline": "Ferrero North America Announces $100 Million Investment in Majo // ── DATA ──────────────────────────────────────────────────────────────────
async function fetchData() {
  // If data is baked into the HTML, use it directly
  if (typeof EMBEDDED_SCAN_DATA !== 'undefined' && EMBEDDED_SCAN_DATA) {
    loadData(EMBEDDED_SCAN_DATA);
    toast('✓ Signals loaded');
    return;
  }
  // Otherwise try fetching from GitHub
  setLoading(true);
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error(r.status);
    loadData(await r.json());
    toast('✓ Signals refreshed');
  } catch {
    setLoading(false);
    document.getElementById('grid').innerHTML = `
      <div class="empty">
        <div class="empty-icon">📡</div>
        <h3>Could not load signals</h3>
        <p>The daily scan runs at 7am weekdays. Check back then or ask your admin to run a manual scan.</p>
      </div>`;
    document.getElementById('scanBadge').textContent = 'Not connected';
  }
}

function normalise(raw) {
  // Accept both the new schema (signals[].company / .industry / .hq / .revenue_bn)
  // and the old schema (companies[].company_name / .sector / .headquarters / .estimated_revenue_usd_bn)
  const rows = raw.companies || raw.signals || [];
  return rows.map(c => ({
    company_name:            c.company_name || c.company || 'Unknown',
    sector:                  c.sector || c.industry || '',
    headquarters:            c.headquarters || c.hq || '',
    estimated_revenue_usd_bn: c.estimated_revenue_usd_bn || c.revenue_bn || null,
    decision_maker_title:    c.decision_maker_title || '',
    notes:                   c.notes || '',
    signals: (c.signals || []).map(s => ({
      signal_id:    s.signal_id || '',
      signal_label: s.signal_label || s.title || '',
      description:  s.description || '',
      news_headline: s.news_headline || '',
      news_source:  s.news_source || '',
      news_date:    s.news_date || '',
      news_url:     s.news_url || '',
    })),
  }));
}

function loadData(data) {
  allCompanies = normalise(data);
  activeFilters.clear();
  document.getElementById('scanBadge').textContent = '📅 ' + (data.scan_date || 'Latest');
  const sigs = allCompanies.reduce((s,c) => s + (c.signals||[]).length, 0);
  document.getElementById('statCompanies').textContent = allCompanies.length;
  document.getElementById('statSignals').textContent = sigs;
  document.getElementById('statsRow').style.display = 'flex';
  document.getElementById('toolbar').style.display = 'flex';
  buildSigBtns();
  document.getElementById('sigRow').style.display = allCompanies.length ? 'flex' : 'none';
  setLoading(false);
  render();
}

function setLoading(on) {
  document.getElementById('loadingBar').style.width = on ? '65%' : '0';
}

// ── SIGNAL FILTERS ────────────────────────────────────────────────────────
function buildSigBtns() {
  const map = new Map();
  allCompanies.forEach(c => (c.signals||[]).forEach(s => {
    if (!s.signal_id) return;
    if (!map.has(s.signal_id)) {
      const meta = SIGNAL_TYPES.find(t => t.id === s.signal_id);
      map.set(s.signal_id, { icon: meta?.icon || '📌', label: meta?.label || s.signal_label || s.signal_id, count: 0 });
    }
    map.get(s.signal_id).count++;
  }));
  const sorted = [...map.entries()].sort((a,b) => {
    const ai = SIGNAL_TYPES.findIndex(t=>t.id===a[0]);
    const bi = SIGNAL_TYPES.findIndex(t=>t.id===b[0]);
    return (ai<0?99:ai) - (bi<0?99:bi);
  });
  document.getElementById('sigBtns').innerHTML = sorted.map(([id,m]) =>
    `<button class="sig-btn" data-id="${id}" onclick="toggleSig(this,'${id}')">${m.icon} ${m.label}<span class="n">${m.count}</span></button>`
  ).join('');
}

function toggleSig(btn, id) {
  activeFilters.has(id) ? (activeFilters.delete(id), btn.classList.remove('on')) : (activeFilters.add(id), btn.classList.add('on'));
  document.getElementById('clearBtn').disabled = activeFilters.size === 0;
  render();
}

function clearFilters() {
  activeFilters.clear();
  document.querySelectorAll('.sig-btn').forEach(b => b.classList.remove('on'));
  document.getElementById('clearBtn').disabled = true;
  render();
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = allCompanies.filter(c => {
    if (activeFilters.size > 0 && ![...activeFilters].every(id=>(c.signals||[]).some(s=>s.signal_id===id))) return false;
    if (q && !([c.company_name, c.sector, c.headquarters].join(' ').toLowerCase().includes(q) ||
               (c.signals||[]).some(s=>(s.signal_label||'').toLowerCase().includes(q)||(s.description||'').toLowerCase().includes(q)))) return false;
    return true;
  });
  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><h3>No matches</h3><p>Try clearing your filters or searching something else.</p></div>`;
    return;
  }
  grid.innerHTML = list.map(cardHTML).join('');
}

// ── CARD ──────────────────────────────────────────────────────────────────
function cardHTML(c) {
  const sigs = c.signals || [];
  const rev = c.estimated_revenue_usd_bn ? `$${c.estimated_revenue_usd_bn}bn` : null;
  const enc = encodeURIComponent(JSON.stringify(c));

  const sigsHTML = sigs.slice(0,3).map(s => {
    const meta = SIGNAL_TYPES.find(t => t.id === s.signal_id);
    const icon = meta?.icon || '📌';
    const link = s.news_url
      ? `<a class="sig-link" href="${s.news_url}" target="_blank" onclick="event.stopPropagation()">↗ Read article</a>`
      : '';
    return `
      <div class="signal-chip">
        <div class="sig-icon">${icon}</div>
        <div class="sig-body">
          <div class="sig-type">${s.signal_label || ''}</div>
          <div class="sig-desc">${s.description || ''}</div>
          <div class="sig-meta">
            ${s.news_source ? `<span class="sig-source">📰 ${s.news_source}${s.news_date?' · '+s.news_date:''}</span>` : ''}
            ${link}
          </div>
        </div>
      </div>`;
  }).join('');

  const more = sigs.length > 3
    ? `<div class="more-signals">+${sigs.length-3} more signal${sigs.length-3>1?'s':''} — click to see all</div>`
    : '';

  return `
    <div class="card" onclick="openModal('${enc}')">
      <div class="card-top-bar"></div>
      <div class="card-header">
        ${avatarHTML(c.company_name)}
        <div class="card-identity">
          <h3>${c.company_name}</h3>
          <div class="tags">
            ${c.sector ? `<span class="tag sector">${c.sector}</span>` : ''}
            ${c.headquarters ? `<span class="tag hq">📍 ${c.headquarters}</span>` : ''}
            ${rev ? `<span class="tag rev">💰 ${rev}</span>` : ''}
          </div>
        </div>
      </div>
      <div class="card-signals">
        <div class="sig-count-label">Buy Signals (${sigs.length})</div>
        ${sigsHTML}
        ${more}
      </div>
    </div>`;
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function openModal(enc) {
  const c = JSON.parse(decodeURIComponent(enc));
  const sigs = c.signals || [];
  const rev = c.estimated_revenue_usd_bn ? `$${c.estimated_revenue_usd_bn}bn` : null;

  document.getElementById('mAvatar').innerHTML = avatarHTML(c.company_name, 48);
  document.getElementById('mTitle').textContent = c.company_name;
  document.getElementById('mTags').innerHTML = [
    c.sector && `<span class="tag sector">${c.sector}</span>`,
    c.headquarters && `<span class="tag hq">📍 ${c.headquarters}</span>`,
    rev && `<span class="tag rev">💰 ${rev}</span>`,
  ].filter(Boolean).join('');

  const infoHTML = `
    <div class="modal-section">
      <div class="modal-section-title">Company Details</div>
      <div class="modal-info-grid">
        ${c.decision_maker_title ? `<div class="info-item"><div class="lbl">Key Contact</div><div class="val">${c.decision_maker_title}</div></div>` : ''}
        ${c.estimated_revenue_usd_bn ? `<div class="info-item"><div class="lbl">Annual Revenue</div><div class="val">$${c.estimated_revenue_usd_bn}bn</div></div>` : ''}
        ${c.headquarters ? `<div class="info-item"><div class="lbl">Headquarters</div><div class="val">${c.headquarters}</div></div>` : ''}
        ${c.sector ? `<div class="info-item"><div class="lbl">Sector</div><div class="val">${c.sector}</div></div>` : ''}
        ${c.notes ? `<div class="info-item" style="grid-column:1/-1"><div class="lbl">Notes</div><div class="val" style="font-weight:400;color:var(--grey-600)">${c.notes}</div></div>` : ''}
      </div>
    </div>`;

  const sigsHTML = `
    <div class="modal-section">
      <div class="modal-section-title">Buy Signals (${sigs.length})</div>
      ${sigs.map(s => {
        const meta = SIGNAL_TYPES.find(t => t.id === s.signal_id);
        const icon = meta?.icon || '📌';
        const articleLink = s.news_url
          ? `<a class="article-link" href="${s.news_url}" target="_blank">↗ Read article</a>`
          : '';
        return `
          <div class="modal-signal">
            <div class="modal-signal-hdr">${icon} ${s.signal_label || ''}</div>
            <div class="modal-signal-desc">${s.description || ''}</div>
            ${(s.news_headline || s.news_source) ? `
              <div class="modal-signal-news">
                ${s.news_headline ? `<div class="headline">"${s.news_headline}"</div>` : ''}
                <div class="source-row">
                  <span class="source">📰 ${s.news_source||''}${s.news_date?' · '+s.news_date:''}</span>
                  ${articleLink}
                </div>
              </div>` : ''}
          </div>`;
      }).join('')}
    </div>`;

  document.getElementById('mBody').innerHTML = infoHTML + sigsHTML;
  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }
document.addEventListener('keydown', e => e.key === 'Escape' && closeModal());

// ── TOAST ─────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── INIT ──────────────────────────────────────────────────────────────────
fetchData();
</script>
</body>
</html>
